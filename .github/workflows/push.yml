name: Build Lean project

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  style_lint:
    name: Lint style
    runs-on: ubuntu-latest
    steps:
      - name: Checkout project
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Don't 'import Mathlib', use precise imports
        if: always()
        run: |
          ! (find ClassFieldTheory -name "*.lean" -type f -print0 | xargs -0 grep -E -n '^import Mathlib$')

      - name: Files in ClassFieldTheory.Mathlib can't import ClassFieldTheory files outside ClassFieldTheory.Mathlib
        run: |
          ! (find ClassFieldTheory/Mathlib -name "*.lean" -type f -print0 | xargs -0 grep -E -n '^import ClassFieldTheory.(?!Mathlib)')

  build:
    name: Build project
    runs-on: ubuntu-latest
    steps:
      - name: Checkout project
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Fetch all history for all branches and tags

      - name: Build and lint the project
        id: build-lean
        uses: leanprover/lean-action@38fbc41a8c28c4cbaec22d7f7de508ec2e7c0dd9 # v1.5.0

      - name: Upstreaming dashboard
        if: github.ref == 'refs/heads/main'
        uses: leanprover-community/upstreaming-dashboard-action@main
        with:
          website-directory: ./website
          project-name: ClassFieldTheory
          relevant-labels: CFT
          include-drafts: true
          branch-name: main

      - if: github.ref == 'refs/heads/main'
        name: File dependencies
        run: |
          sudo apt-get update
          sudo apt install graphviz -y
          ~/.elan/bin/lake exe graph website/file_deps.pdf

      - if: github.ref == 'refs/heads/main'
        name: Build project documentation
        id: build-docgen
        uses: leanprover-community/docgen-action@main
        with:
          blueprint: true
